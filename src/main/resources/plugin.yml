name: WaveBack
version: ${version}
main: dev.cheddah.waveback.WaveBackPlugin
api-version: "1.21"
description: Customize join/leave messages and reward players for welcoming others back.
author: Colby
softdepend: [Vault, PlaceholderAPI]

commands:
  waveback:
    description: Reloads the WaveBack configuration.
    usage: /waveback reload
    aliases:
      - wb
    permission: waveback.reload

permissions:
  waveback.reload:
    description: Allows reloading the WaveBack configuration.
    default: op
  waveback.greet:
    description: Allows earning rewards for greeting returning players.
    default: true
  waveback.bypasscooldown:
    description: Bypasses the per-greeter reward cooldown.
    default: false
  waveback.testreward:
    description: Allows testing the configured welcome-back reward bundle.
    default: op
  waveback.stats:
    description: Allows viewing your own WaveBack greeting stats.
    default: true
  waveback.leaderboard:
    description: Allows viewing the WaveBack greeting leaderboard.
    default: true
