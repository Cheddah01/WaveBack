name: CustomJoinMessage
version: ${version}
main: dev.cheddah.customjoinmessage.CustomJoinMessagePlugin
api-version: "1.21"
description: Customizes player join messages.
author: Colby
softdepend: [Vault]

commands:
  customjoinmessage:
    description: Reloads the CustomJoinMessage configuration.
    usage: /customjoinmessage reload
    aliases:
      - cjm
    permission: customjoinmessage.reload

permissions:
  customjoinmessage.reload:
    description: Allows reloading the CustomJoinMessage configuration.
    default: op
  customjoinmessage.greet:
    description: Allows earning rewards for greeting returning players.
    default: true
  customjoinmessage.bypasscooldown:
    description: Bypasses the per-greeter reward cooldown.
    default: false
  customjoinmessage.testreward:
    description: Allows testing the configured welcome-back reward bundle.
    default: op
