# Messages use MiniMessage formatting.
# Basic colors: <red>, <green>, <yellow>, <aqua>, <gray>, <white>, etc.
# Hex colors: <#FF5733>text</#FF5733> or shorthand <#FF5733>text
# Decorations: <bold>, <italic>, <underlined>, <strikethrough>, <obfuscated>
# Reset formatting: <reset>
# Gradients: <gradient:#ff5733:#ffaa00>text</gradient>
# Closing tags are optional in many cases, but recommended for nested formatting.
# Official docs: https://docs.advntr.dev/minimessage/format.html
#
# Placeholders:
#   {player}       The player's username
#   {display_name} The player's display name
#
join:
  # Set enabled to false if you want Paper's default join messages again.
  enabled: true

  message: "<gray>[<green>+<gray>] <yellow>{player}</yellow> joined the server!"

  # If true, this sends no public join message.
  silent: false

  sound:
    enabled: false
    name: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.0

  firework:
    enabled: false
    power: 1
    type: BALL
    flicker: false
    trail: true
    # If true, the firework explodes in place instead of flying upward.
    instant-detonate: false
    colors:
      - LIME
      - YELLOW
    fade-colors:
      - AQUA

leave:
  # Set enabled to false if you want Paper's default leave messages again.
  enabled: true

  message: "<gray>[<red>-<gray>] <yellow>{player}</yellow> left the server."

  # If true, this sends no public leave message.
  silent: false

  sound:
    enabled: false
    name: ENTITY_ITEM_BREAK
    volume: 1.0
    pitch: 1.0

  firework:
    enabled: false
    power: 1
    type: BALL
    flicker: false
    trail: true
    # If true, the firework explodes in place instead of flying upward.
    instant-detonate: false
    colors:
      - RED
      - ORANGE
    fade-colors:
      - YELLOW

# ─── Welcome-Back Rewards ──────────────────────────────────────
# Reward players for welcoming others back to the server.
rewards:
  # Master enable switch for this entire feature.
  enabled: true

  # How long after a join (in seconds) greetings count.
  greeting-window-seconds: 30

  # Phrases that count as a greeting. Case-insensitive; punctuation
  # at the start/end is ignored, so "wb!" and "WB" match "wb".
  triggers:
    - wb
    - welcome back
    - wbb
    - dubs

  # If true, the entire chat message must equal a trigger.
  # If false, the trigger can appear anywhere in the message.
  whole-message-only: true

  # Maximum greeters rewarded per join. 0 = unlimited.
  max-rewards-per-join: 3

  # Cooldown between rewards for the same greeter (seconds).
  reward-cooldown-seconds: 300

  # Should rewards trigger on a player's first-ever join?
  # Usually false since "wb" implies the player is returning.
  reward-on-first-join: false

  # Minimum playtime (in minutes) the JOINING player must have.
  # Prevents alt-spam farming. 0 to disable.
  minimum-joiner-playtime-minutes: 10

  # Bundle of rewards a greeter gets. ALL of these fire together.
  # Supported types: command, money, item
  bundle:
    - type: money
      amount: 50.0
    - type: item
      material: DIAMOND
      amount: 1
      name: "<aqua>Thank-You Diamond"
      lore:
        - "<gray>For being a kind soul."

  # MiniMessage messages. Set to "" to disable.
  messages:
    reward-received: "<gray>✦ Thanks for welcoming <yellow>{joiner}</yellow><gray> back!"
    broadcast: ""
